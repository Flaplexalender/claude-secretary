# Deep Mode Architecture Test
#
# Validates the single-billing-event architecture:
#   - Deep tier triggers: 200 turn limit, 7200s timeout, agent_prefix=true
#   - run_python tool available and used for bulk file operations
#   - Premium tracking shows 1×3 = 3 (expected cost per request)
#
# Run:
#   cd 
#   .venv\Scripts\python.exe -m secretary watch --campaign campaigns/deep-mode-test.yaml --max-runs 1
#
# After run, check:
#   - data/run_log.jsonl last entry: premium_cost should be 3.0, num_turns > 1
#   - data/deep-test-results.md should exist with bulk operation results

tasks:
  - id: deep_architecture_test
    tier: deep
    timeout: 600          # 10 min cap for the test (not full 2hr)
    skip_if_recent: false
    prompt: |
      [DEEP MODE ARCHITECTURE TEST — validate single-billing-event design]

      You are testing that deep mode works correctly. Complete ALL of these steps:

      STEP 1 — Verify run_python works for bulk reads:
      Use run_python to execute a Python script that:
      - Lists all .py files in src/secretary/
      - Counts total lines of code across all of them
      - Reports the top 5 largest files by line count

      STEP 2 — Verify run_python works for bulk writes:
      Use run_python to create data/deep-test-results.md with the file stats from Step 1.

      STEP 3 — Verify parallel tool calls work:
      In a SINGLE response, call at least 4 tools in parallel:
      - grep_search for "deep" in src/secretary/config.py
      - grep_search for "run_python" in src/secretary/direct_tools.py
      - file_read on src/secretary/campaign.py (first 20 lines)
      - run_python to print the current timestamp

      STEP 4 — Write final summary:
      Use file_edit to append to data/deep-test-results.md:
      - How many turns you used
      - How many tool calls total
      - Whether run_python worked for bulk operations
      - Whether parallel tool calls worked
      - Timestamp of test completion

      When done, output: "DEEP MODE TEST COMPLETE"
