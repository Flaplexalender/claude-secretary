# Implementation Density v4 — Push edit→test→fix cycles to 3+ tools/turn
#
# Problem: Exploration tasks hit 5-6 t/t, but implementation tasks are 1.3-1.9.
# The edit→test→fix cycle is sequential — but there are parallel patterns:
#   - Read N files in one turn (context gathering)
#   - Edit N files in one turn (batch edits)
#   - Edit + test + grep in one turn (pipelined)
#
# Launch: 3 instances
#   secretary watch --instance impl-a --campaign campaigns/impl-density-v4.yaml --max-runs 1
#   secretary watch --instance impl-b --campaign campaigns/impl-density-v4.yaml --max-runs 1
#   secretary watch --instance impl-c --campaign campaigns/impl-density-v4.yaml --max-runs 1

tasks:
  # Task 1: Multi-file edit (must edit 3+ files in parallel per turn)
  - id: batch_edit
    prompt: |
      Add a module-level constant `_VERSION = "1.0.1"` as the SECOND line (after the module docstring) of EACH of these files. Do ALL edits in a single response:
      - src/secretary/currency.py
      - src/secretary/history.py
      - src/secretary/run_log.py
      - src/secretary/coordinator.py
      - src/secretary/task_batcher.py

      Then run `python -m pytest tests/ -q --tb=no` to verify nothing breaks.
      Then use grep_search to confirm all 5 files have _VERSION.
      Finally revert all changes by removing the _VERSION lines (5 more file_edits).

      ALL file_edits for adding should be in ONE response. ALL file_edits for removing should be in ONE response.
    tier: high
    priority: 1
    timeout: 300

  # Task 2: Read→analyze→implement→test pipeline
  - id: pipeline_impl
    prompt: |
      Implement a tiny optimization and test it — everything in minimum turns:

      Turn 1 (6+ tools): Read src/secretary/router.py, src/secretary/config.py, and tests/test_router.py in parallel. Also grep_search for "estimate_complexity" across tests/.
      Turn 2 (6+ tools): Based on what you read, add ONE new test case to tests/test_router.py that tests a multi-step task routing to "high" tier. Also edit the _VERSION constant if you added one. Run pytest. grep to verify.
      Turn 3: Report results in text.

      You MUST complete this in exactly 3 turns.
    tier: high
    priority: 2
    timeout: 300

  # Task 3: Self-analysis of the agent loop for implementation density
  - id: self_analyze_impl
    prompt: |
      RESEARCH TASK — Analyze why implementation tasks get low tools/turn.

      Read these files in parallel (6+ reads):
      - src/secretary/direct_agent.py (the agent loop)
      - data/run_log.jsonl (recent task history — look at tools_used field)
      - src/secretary/direct_tools.py (tool definitions)
      - campaigns/impl-density-v4.yaml (this campaign)
      - src/secretary/config.py
      - src/secretary/watcher.py

      Then analyze:
      1. Count tools/turn for the last 10 run_log entries
      2. Identify which TYPES of turns have low density (turns that call file_edit vs file_read)
      3. Propose 3 specific code changes to direct_agent.py that would increase implementation density

      Write findings to data/scratchpad.md.
    tier: high
    priority: 3
    timeout: 400
